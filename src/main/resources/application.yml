server:
  port: 9090

spring:
  application:
    name: comerciantes

  datasource:
    url: jdbc:mysql://localhost:3306/mercado_db
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true

    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        format_sql: true
